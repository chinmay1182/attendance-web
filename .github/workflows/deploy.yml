name: Production Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e

            APP_DIR="/home/myaccount/apps/attendance-web"
            RELEASES_DIR="$APP_DIR/releases"
            CURRENT_LINK="$APP_DIR/current"
            TIMESTAMP=$(date +%s)

            echo "🚀 Starting deploy..."

            mkdir -p $RELEASES_DIR
            cd $RELEASES_DIR

            echo "📥 Cloning new release..."
            git clone https://github.com/chinmay1182/attendance-web.git $TIMESTAMP

            cd $TIMESTAMP

            echo "📦 Installing & building..."
            docker compose build

            echo "🔗 Switching to new release..."
            ln -sfn $RELEASES_DIR/$TIMESTAMP $CURRENT_LINK

            cd $CURRENT_LINK

            echo "🐳 Restarting containers..."
            docker compose down || true
            docker compose up -d

            echo "🧹 Cleaning old releases..."
            ls -dt $RELEASES_DIR/* | tail -n +4 | xargs rm -rf || true

            echo "🧼 Cleaning Docker..."
            docker image prune -f

            echo "✅ Deployment successful!"