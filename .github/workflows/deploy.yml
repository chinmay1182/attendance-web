script: |
  set -e

  APP_DIR="/home/myaccount/htdocs/myaccount.asia"
  CONTAINER_NAME="attendance-web"

  echo "Starting deployment to $APP_DIR..."

  if [ ! -d "$APP_DIR" ]; then
    echo "Creating directory..."
    mkdir -p $APP_DIR
  fi

  cd $APP_DIR

  echo "Checking repo..."

  if [ -d ".git" ]; then
    echo "Repo exists → pulling latest code"
    git fetch --all
    git reset --hard origin/main || git reset --hard origin/master
  else
    echo "Fresh setup → cleaning directory and cloning"
    
    # ⚠️ Important fix
    rm -rf * .[^.]* 2>/dev/null || true
    
    git clone https://github.com/chinmay1182/attendance-web.git .
  fi

  echo "Starting Docker..."

  if [ ! -f .env ]; then
    echo "Warning: .env file missing"
  fi

  if [ "$(docker ps -aq -f name=$CONTAINER_NAME)" ]; then
    docker rm -f $CONTAINER_NAME
  fi

  docker compose down --remove-orphans || true
  docker compose up -d --build

  docker image prune -f

  echo "Deployment successful 🚀"